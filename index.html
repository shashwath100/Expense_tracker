<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>

    <!-- Header -->
    <header class="app-header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">💰</span>
                <span class="logo-text">FinTrack</span>
            </div>
            <div class="header-right">
                <div class="currency-selector">
                    <span class="currency-label">Currency</span>
                    <select id="currency-select">
                        <option value="USD">🇺🇸 USD — US Dollar</option>
                        <option value="INR">🇮🇳 INR — Indian Rupee</option>
                        <option value="EUR">🇪🇺 EUR — Euro</option>
                        <option value="GBP">🇬🇧 GBP — British Pound</option>
                        <option value="JPY">🇯🇵 JPY — Japanese Yen</option>
                        <option value="CNY">🇨🇳 CNY — Chinese Yuan</option>
                        <option value="AED">🇦🇪 AED — UAE Dirham</option>
                        <option value="AUD">🇦🇺 AUD — Australian Dollar</option>
                        <option value="CAD">🇨🇦 CAD — Canadian Dollar</option>
                        <option value="SGD">🇸🇬 SGD — Singapore Dollar</option>
                        <option value="CHF">🇨🇭 CHF — Swiss Franc</option>
                        <option value="MYR">🇲🇾 MYR — Malaysian Ringgit</option>
                        <option value="BRL">🇧🇷 BRL — Brazilian Real</option>
                        <option value="ZAR">🇿🇦 ZAR — South African Rand</option>
                        <option value="MXN">🇲🇽 MXN — Mexican Peso</option>
                        <option value="IDR">🇮🇩 IDR — Indonesian Rupiah</option>
                        <option value="PKR">🇵🇰 PKR — Pakistani Rupee</option>
                        <option value="BDT">🇧🇩 BDT — Bangladeshi Taka</option>
                        <option value="NGN">🇳🇬 NGN — Nigerian Naira</option>
                        <option value="KRW">🇰🇷 KRW — South Korean Won</option>
                    </select>
                </div>
                <div class="header-date" id="header-date"></div>
            </div>
        </div>
    </header>

    <main class="app-main">

        <!-- Summary Cards -->
        <section class="summary-grid">
            <div class="card card-balance">
                <p class="card-label">Total Balance</p>
                <h2 id="balance" class="card-value">$0.00</h2>
                <span class="card-badge">Net Worth</span>
            </div>
            <div class="card card-income">
                <p class="card-label">Total Income</p>
                <h2 id="money-plus" class="card-value">+$0.00</h2>
                <span class="card-badge">Earnings</span>
            </div>
            <div class="card card-expense">
                <p class="card-label">Total Expenses</p>
                <h2 id="money-minus" class="card-value">-$0.00</h2>
                <span class="card-badge">Spending</span>
            </div>
        </section>

        <!-- Charts -->
        <section class="charts-grid">
            <div class="chart-card">
                <h3 class="chart-title">Income vs Expenses</h3>
                <div class="chart-wrapper">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3 class="chart-title">Spending by Category</h3>
                <div class="chart-wrapper">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Add Transaction + History -->
        <section class="bottom-grid">

            <!-- Form -->
            <div class="form-card">
                <h3 class="section-title">Add Transaction</h3>
                <form id="form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="text">Description</label>
                            <input type="text" id="text" placeholder="e.g. Grocery run" autocomplete="off" />
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount (<span id="amount-currency-label"></span>$</span>)</label>
                            <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" />
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category">
                                <option value="General">General</option>
                                <option value="Food">🍔 Food &amp; Dining</option>
                                <option value="Transport">🚗 Transport</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Health">💊 Health</option>
                                <option value="Entertainment">🎬 Entertainment</option>
                                <option value="Bills">🧾 Bills &amp; Utilities</option>
                                <option value="Salary">💼 Salary</option>
                                <option value="Investment">📈 Investment</option>
                                <option value="Other">📦 Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row type-row">
                        <div class="type-toggle-group">
                            <button type="button" class="type-btn active" id="btn-income" data-type="income">
                                ↑ Income
                            </button>
                            <button type="button" class="type-btn" id="btn-expense" data-type="expense">
                                ↓ Expense
                            </button>
                        </div>
                    </div>
                    <button class="submit-btn" type="submit">Add Transaction</button>
                </form>
            </div>

            <!-- History -->
            <div class="history-card">
                <div class="history-header">
                    <h3 class="section-title">Transaction History</h3>
                    <input type="text" id="search" placeholder="🔍 Search..." class="search-input" />
                </div>
                <ul id="list" class="transaction-list"></ul>
                <p id="empty-state" class="empty-state">No transactions yet. Add one above!</p>
            </div>

        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
